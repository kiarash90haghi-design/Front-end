<body>

<header>

    <h1>
        <i class="fa-solid fa-user"></i>
        حساب کاربری

    <div class="toolbar">
        <button id="menu-btn" class="menu-btn">
            ☰
        </button>
    </div>

</header>

<!-- Sidebar -->

<aside class="side-bar">

    <div class="side-bar-header">
        <img src="../img/icons8-logo-50.png">
        <h2>Techno Kia</h2>
    </div>

    <button id="close-btn">✕</button>

    <a href="./home.html">
        <img src="../bnt/home-25.png">

    </a>

        <span>سبد خرید</span>

        <span>تماس با ما</span>

</aside>

<!-- Main -->

<main class="profile-page">

    <!-- Profile Card -->

    <section class="profile-card">

        <img src="../img/IMG_20251015_230845_064.jpg" class="profile-image">

        <h2>کیارش حقی</h2>

        <p>kiarash@example.com</p>

        <button class="edit-btn">
            <i class="fa-solid fa-pen"></i>
            ویرایش پروفایل
        </button>

    </section>

    <!-- Menu -->

    <section class="account-menu">

        <a href="#" class="menu-card">

            <div>
                <i class="fa-solid fa-box"></i>
                <span>سفارش‌های من</span>
            </div>

            <i class="fa-solid fa-chevron-left"></i>

        </a>

        <a href="#" class="menu-card">

            <div>
                <i class="fa-solid fa-heart"></i>
                <span>علاقه‌مندی‌ها</span>
            </div>

            <i class="fa-solid fa-chevron-left"></i>

        </a>

        <a href="#" class="menu-card">

            <div>
                <i class="fa-solid fa-location-dot"></i>
                <span>آدرس‌ها</span>
            </div>

            <i class="fa-solid fa-chevron-left"></i>

        </a>

        <a href="#" class="menu-card">

            <div>
                <i class="fa-solid fa-credit-card"></i>
                <span>روش‌های پرداخت</span>
            </div>

            <i class="fa-solid fa-chevron-left"></i>

        </a>

        <a href="#" class="menu-card">

            <div>
                <i class="fa-solid fa-bell"></i>
                <span>تنظیمات اعلان</span>
            </div>

            <i class="fa-solid fa-chevron-left"></i>

        </a>

        <a href="#" class="menu-card">

            <div>
                <i class="fa-solid fa-gear"></i>
                <span>تنظیمات حساب</span>
            </div>

            <i class="fa-solid fa-chevron-left"></i>

        </a>

        <a href="#" class="menu-card logout">

            <div>
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>خروج از حساب</span>
            </div>

        </a>

    </section>
