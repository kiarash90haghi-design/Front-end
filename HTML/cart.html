<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techno Kia | Shopping Cart</title>
    <link rel="stylesheet" href="../css/cart.css">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<header>

    <h1>🛒 سبد خرید</h1>

    <div class="toolbar">
        <button id="menu-btn" class="menu-btn">
            ☰
        </button>
    </div>

</header>

<aside class="side-bar">
    <div class="side-bar-header">
        <img src="../img/icons8-logo-50.png">
        <h2>Techno kia</h2>
    </div>

    <button id="close-btn">
        ✕
    </button>


    <a href="#"><img src="../bnt/notification-25.png" class="side-bar-btn">
        <span>پیام ها</span>
    </a>

    <a href="#"><img src="../bnt/phone-25.png" class="side-bar-btn">
        <span>تماس با ما</span>
    </a>
    
    <a href="home.html"><img src="../bnt/home-25.png" class="side-bar-btn">
        <span>خانه</span>
    </a>

    <a href="#"><img src="../bnt/user-25.png" class="side-bar-btn">
        <span>حساب کاربری</span>
    </a>
</aside>

<main>

    <section class="cart-items" id="cart-items">

        <!-- the proguct are biuld here! -->

    </section>

    <section class="cart-summary">

        <h2>خلاصه سفارش</h2>

        <div class="summary-row">
            <span>تعداد کالا</span>
            <span id="item-count">0</span>
        </div>

        <div class="summary-row">
            <span>جمع کل</span>
            <span id="total-price">0 تومان</span>
        </div>

        <button class="checkout-btn">
            ثبت سفارش
        </button>

    </section>

    <nav class="bottom-nav">
        <a href="./notif.html"><img src="../bnt/notification-25.png">
            <span>پیام ها</span>
        </a>

        <a href="#"><img src="../bnt/phone-25.png">
            <span>تماس با ما</span>
        </a>
        
        <a href="home.html"><img src="../bnt/home-25.png">
            <span>خانه</span>
        </a>

        <a href="#"><img src="../bnt/user-25.png">
            <span>حساب کاربری</span>
        </a>
    </nav>

</main>

<script src="../JS/cart.js"></script>

</body>
</html>
